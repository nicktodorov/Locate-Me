<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fuelo Near Me" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Fuelo Near Me</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --accent: #f5a800;
      --accent-dim: rgba(245, 168, 0, 0.12);
      --text: #f0f0f0;
      --muted: #666;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      position: relative;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .fuel-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 0.3rem;
      text-align: center;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    #btn {
      width: 100%;
      padding: 1rem 1.5rem;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 3px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      -webkit-tap-highlight-color: transparent;
    }

    #btn:active {
      transform: scale(0.97);
      background: #d49200;
    }

    #btn:disabled {
      background: #3a3a3a;
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 1.2rem;
      min-height: 1.4rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    #status.error {
      color: #e05555;
    }

    #status.loading {
      color: var(--accent);
    }

    .pulse-ring {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0a0a0a;
      border: 2px solid #0a0a0a;
      position: relative;
      flex-shrink: 0;
    }

    .pulse-ring.active {
      display: block;
    }

    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #0a0a0a;
      animation: pulse 1s ease-out infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(0.8); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 1.8rem 0 1.2rem;
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
    }

    /* fade-in on load */
    .card {
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Fuel pump SVG icon -->
    <svg class="fuel-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="14" width="22" height="28" rx="2" stroke="#f5a800" stroke-width="2"/>
      <rect x="11" y="19" width="12" height="8" rx="1" fill="#f5a800" opacity="0.3" stroke="#f5a800" stroke-width="1.5"/>
      <path d="M28 20h4a2 2 0 0 1 2 2v10a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V18l-4-6" stroke="#f5a800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 12l4 6" stroke="#f5a800" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="42" x2="28" y2="42" stroke="#f5a800" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <h1>Fuelo <span>Near Me</span></h1>
    <p class="subtitle">Locate nearby fuel stations</p>

    <button id="btn" onclick="goToFuelo()">
      <span id="btn-ring" class="pulse-ring"></span>
      <span id="btn-label">Find Stations Near Me</span>
    </button>

    <p id="status"></p>

    <div class="divider"></div>
    <p class="hint">
      Opens <a href="https://m.fuelo.net" target="_blank">fuelo.net</a> centered on your current GPS location.
      <br/>Allow location when prompted.
    </p>
  </div>

  <script>
    function goToFuelo() {
      const btn = document.getElementById('btn');
      const label = document.getElementById('btn-label');
      const ring = document.getElementById('btn-ring');
      const status = document.getElementById('status');

      if (!navigator.geolocation) {
        status.textContent = 'Geolocation not supported by this browser.';
        status.className = 'error';
        return;
      }

      btn.disabled = true;
      ring.classList.add('active');
      label.textContent = 'Getting Location…';
      status.textContent = 'Waiting for GPS signal…';
      status.className = 'loading';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude.toFixed(7);
          const lng = pos.coords.longitude.toFixed(7);
          status.textContent = `Got it — ${lat}, ${lng}`;
          status.className = '';
          window.location.href = `https://m.fuelo.net/m/map/${lat}/${lng}?lang=en`;
        },
        (err) => {
          btn.disabled = false;
          ring.classList.remove('active');
          label.textContent = 'Find Stations Near Me';

          const messages = {
            1: 'Location access denied. Please allow it in browser settings.',
            2: 'Could not determine your position. Try again.',
            3: 'Location request timed out. Try again.',
          };
          status.textContent = messages[err.code] || 'Unknown error.';
          status.className = 'error';
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
